# Supply-chain hygiene — mirrors the backend's uv `exclude-newer = "1 week"`.
# A version must be at least 7 days old before pnpm will install it, so a
# freshly-published (possibly compromised) release has time to be flagged/yanked
# before it can land here. minimumReleaseAge is in MINUTES (10080 = 7 days).
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@types/*"   # type stubs are low-risk; fast-track them (and urgent security fixes go here too)

# Native bindings (Vite 8's rolldown bundler, lightningcss) ship as per-platform
# optional deps. This repo is developed on Windows but deployed on Linux, so list
# both targets explicitly. `current` keeps installs correct on whichever machine
# is running pnpm; the concrete Windows/Linux entries keep local dev and Vercel
# builds from pruning each other's native bindings.
supportedArchitectures:
  os:
    - current
    - win32
    - linux
  cpu:
    - current
    - arm64
    - x64
  libc:
    - current
    - glibc
